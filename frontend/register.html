<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - College Event System</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      display: flex;
      min-height: 100vh;
      background: #1b2334;
      color: #fff;
    }
    .left-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px;
      background: linear-gradient(135deg, #233044, #415372);
    }
    .left-section h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }
    .left-section p {
      font-size: 15px;
      opacity: 0.9;
      max-width: 400px;
      text-align: center;
    }
    .right-section {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px;
    }
    .form-box {
      width: 350px;
      background: rgba(255,255,255,0.08);
      padding: 30px;
      border-radius: 12px;
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.35);
    }
    h2 {
      text-align: center;
      margin-bottom: 15px;
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: none;
      border-radius: 6px;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #4a7cff;
      border: none;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 10px;
      font-size: 15px;
    }
    button:hover { background: #3c69d6; }
    #otp-box { display: none; }
    a { color: #aad1ff; text-decoration: none; margin-top: 10px; display: block; text-align: center; }
  </style>
</head>
<body>
  <div class="left-section">
    <h1>College Event Management System</h1>
    <p>Register to explore and participate in campus events, workshops, fests, and more.</p>
  </div>

  <div class="right-section">
    <div class="form-box">
      <h2>Register</h2>

      <div id="reg-box">
        <input type="text" id="name" placeholder="Full Name" />
        <input type="email" id="email" placeholder="Email (@sru.edu.in)" />
        <input type="password" id="password" placeholder="Create Password" />
        <button onclick="requestOtp()">Request OTP</button>
        <a href="index.html">Already have an account? Login</a>
      </div>

      <div id="otp-box">
        <input type="text" id="otp" placeholder="Enter OTP" />
        <button onclick="verifyOtp()">Verify & Complete Registration</button>
      </div>
    </div>
  </div>

<script>
  const API = "https://event-management-system-1-6oq1.onrender.com";
  let currentEmail = "", currentName = "", currentPass = "";

  async function requestOtp() {
    currentName = document.getElementById("name").value.trim();
    currentEmail = document.getElementById("email").value.trim();
    currentPass = document.getElementById("password").value.trim();

    if (!currentName || !currentEmail || !currentPass)
      return alert("Fill all fields");

    const send = await fetch(`${API}/request-otp`, {

      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email: currentEmail, type: "register" })
    }).then(r => r.json());

    if (!send.ok) return alert(send.error);

    document.getElementById("reg-box").style.display = "none";
    document.getElementById("otp-box").style.display = "block";
  }

  async function verifyOtp() {
    const otp = document.getElementById("otp").value.trim();
    if (!otp) return alert("Enter OTP");

    const verify = await fetch(`${API}/verify-otp`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email: currentEmail, otp })
    }).then(r => r.json());

    if (!verify.ok) return alert(verify.error);

    const finish = await fetch(`${API}/complete-registration`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name: currentName, email: currentEmail, password: currentPass })
    }).then(r => r.json());

    if (!finish.ok) return alert(finish.error);

    alert("Registration Successful! Please login.");
    window.location.href = "index.html";
  }
</script>
</body>
</html>
